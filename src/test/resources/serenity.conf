driver = chrome
autodownload = true

timeouts {
  implicitlywait = 30000
  fluentwait = 30000
}


chrome.switches="""--start-fullscreen;--test-type;--no-sandbox;--ignore-certificate-errors;
                --disable-popup-blocking;--disable-default-apps;--disable-extensions-file-access-check;
                  --incognito;--disable-infobars;--disable-gpu;--disable-dev-shm-usage"""
verbose = true

loggingPrefs {
  driver = "ALL"
  browser = "ALL"
}

headless.mode = false

environments {
  default {
    base.url = "https://demo.applitools.com/hackathonV2.html"
    url = "https://reqres.in/api/"
  }
  dev {
    base.url = "https://demo.applitools.com/hackathonV2.html"
    url = "https://reqres.in/api/"
  }
  stg {
    base.url = "https://demo.applitools.com/hackathonV2.html"
    url = "https://reqres.in/api/"
  }
  pro {
    base.url = "https://demo.applitools.com/hackathonV2.html"
    url = "https://reqres.in/api/"
  }
}